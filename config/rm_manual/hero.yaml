rm_manual:
  robot_type: "hero"
  dbus_topic: "/rm_ecat_hw/dbus"
  chassis_calibrate_motor: [ ]
  chassis_motor: [ "right_front_wheel_motor", "left_front_wheel_motor", "left_back_wheel_motor", "right_back_wheel_motor" ]
  gimbal_calibrate_motor: [ "scope_joint_motor", "image_transmission_joint_motor" ]
  shooter_calibrate_motor: [ "trigger_joint_motor" ]
  chassis:
    topic: "/cmd_chassis"
    follow_source_frame: "yaw"
    accel_x:
      - [ 50.0,99.0 ]
    accel_y:
      - [ 50.0,99.0 ]
    accel_z:
      - [ 50.0,99.0 ]
    safety_power: 60
    capacitor_threshold: 0.3
    enable_cap_gyro_threshold: 0.45
    disable_cap_gyro_threshold: 0.3
    enable_use_cap_threshold: 0.45
    disable_use_cap_threshold: 0.3
    charge_power: 20
    extra_power: 40
    standard_power: 220
    burst_power: 220
    max_power_limit: 100
    buffer_threshold: 10
    power_gain: 0.0
    total_burst_time: 20
    is_new_capacitor: true
  vel:
    topic: "/cmd_vel"
    power_limit_topic: "/cmd_chassis"
    max_linear_x:
      - [ 50.0,1.7 ]
      - [ 80.0,2.0 ]
      - [ 100.0,2.3 ]
      - [ 220.0,5.0 ]
    max_linear_y:
      - [ 50.0,1.7 ]
      - [ 80.0,2.0 ]
      - [ 100.0,2.3 ]
      - [ 220.0,5.0 ]
    max_angular_z:
      - [ 50.0,3.2 ]
      - [ 80.0,4.5 ]
      - [ 100.0,5.0 ]
      - [ 220.0,8.0 ]
    gyro_move_reduction: 0.20
    gyro_rotate_reduction: 0.70
  gimbal:
    topic: "/controllers/gimbal_controller/command"
    max_yaw_vel: 3.14
    max_pitch_vel: 6.28
    time_constant_rc: 0.08
    time_constant_pc: 0.08
    gimbal_scale: 5
    traj_scale: 0.05
    track_timeout: 0.5
    eject_sensitivity: 0.85
    finish_turning_threshold: 2.9
    target_cost_function:
      k_pos: 1.0
      k_vel: 0.0
      k_hp: 0.0
      k_freq: 99.0
      timeout: 0.1
  ballistic_pitch_step: 0.002
  ballistic_yaw_step: 0.002
  shooter:
    topic: "/controllers/shooter_controller/command"
    track_armor_error_tolerance: 0.12
    untrack_armor_error_tolerance: 0.1
    target_acceleration_tolerance: 1.0
    max_track_target_vel: 1.2
    accleration_moving_average_num: 10
    speed_10m_per_speed: 15.9
    speed_15m_per_speed: 15.9
    speed_16m_per_speed: 15.9
    speed_18m_per_speed: 15.9
    speed_30m_per_speed: 15.9
    wheel_speed_10: 370.0
    wheel_speed_16: 370.0
    deploy_wheel_speed: 500.0
    wheel_speed_offset_normal: -50.0
    wheel_speed_offset_deploy: -180.0
    wheel_speed_offset_front: 0.0
    extra_wheel_speed_once: 5.0
    auto_wheel_speed: false
    speed_oscillation: 0.1
    heat_limit:
      low_shoot_frequency: 1
      high_shoot_frequency: 3
      burst_shoot_frequency: 6
      minimal_shoot_frequency: 1
      safe_shoot_frequency: 1
      local_heat_protect_threshold: 0.0
      heat_coeff: 1
      use_local_heat: true
      type: "ID1_42MM"
  ActiveSuspension:
    topic: "/cmd_active_suspension"
  scope:
    topic: "/controllers/scope_controller/command"
    on_pos: 2.15
    off_pos: 0.02
  image_transmission:
    topic: "/controllers/image_transmission_controller/command"
    on_pos: 0.0
    off_pos: -0.1
  ballistic_solver_request:
    topic: "/ballistic_solver_request"
  detection_switch:
    fail_limit: 10
    service_name: "/Processor/status_switch"
  base_switch:
    fail_limit: 10
    service_name: "/Processor/base_status_switch"
  armor_target_switch:
    fail_limit: 10
    service_name: "/outpost_status_switch"

  controllers_list:
    state_controllers:
      - controllers/robot_state_controller
      - controllers/joint_state_controller
    main_controllers:
      - controllers/chassis_controller
      - controllers/orientation_controller
      - controllers/gimbal_controller
      - controllers/shooter_controller
      - controllers/scope_controller
      - controllers/image_transmission_controller
    calibration_controllers:
      - controllers/trigger_calibration_controller
      - controllers/scope_calibration_controller
      - controllers/image_transmission_calibration_controller

  shooter_calibration:
    - start_controllers:
        - controllers/trigger_calibration_controller
      stop_controllers:
        - controllers/shooter_controller
      services_name:
        - /controllers/trigger_calibration_controller/is_calibrated

  gimbal_calibration:
    - start_controllers:
        - controllers/image_transmission_calibration_controller
      stop_controllers:
        - controllers/image_transmission_controller
      services_name:
        - /controllers/image_transmission_calibration_controller/is_calibrated
    - start_controllers:
        - controllers/scope_calibration_controller
      stop_controllers:
        - controllers/scope_controller
      services_name:
        - /controllers/scope_calibration_controller/is_calibrated

controllers:
  scope_controller:
    type: effort_controllers/JointPositionController
    joint: "scope_joint"
    #pid: { p: 8.0, i: 0.0, d: 0.3, i_clamp_max: 0.0, i_clamp_min: -0.0, antiwindup: true, publish_state: true }
    pid: { p: 0.0, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: -0.0, antiwindup: true, publish_state: true }

  image_transmission_controller:
    type: effort_controllers/JointPositionController
    joint: "image_transmission_joint"
    #pid: { p: 1.0, i: 12.0, d: 0.02, i_clamp_max: 0.0, i_clamp_min: -0.08, antiwindup: true, publish_state: true }
    pid: { p: 0.0, i: 0.0, d: 0.00, i_clamp_max: 0.0, i_clamp_min: -0.00, antiwindup: true, publish_state: true }
