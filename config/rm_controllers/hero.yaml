controllers:
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 100
  robot_state_controller:
    type: robot_state_controller/RobotStateController
    publish_rate: 200

  trigger_calibration_controller:
    type: rm_calibration_controllers/MechanicalCalibrationController
    actuator: [ trigger_joint_motor ]
    velocity:
      search_velocity: 4.0
      vel_threshold: 0.001
      joint: trigger_joint
      pid: { p: 1.2, i: 0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true }

  scope_calibration_controller:
    type: rm_calibration_controllers/MechanicalCalibrationController
    actuator: [ scope_joint_motor ]
    velocity:
      search_velocity: -3.1415
      vel_threshold: 0.001
      joint: scope_joint
      pid: { p: 0.24, i: 0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true }

  image_transmission_calibration_controller:
    type: rm_calibration_controllers/MechanicalCalibrationController
    actuator: [ image_transmission_joint_motor ]
    velocity:
      search_velocity: 12.56
      vel_threshold: 0.001
      joint: image_transmission_joint
      pid: { p: 0.006, i: 0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true }

  chassis_controller:
    type: rm_chassis_controllers/ActiveSuspensionController
    # ChassisBase
    publish_rate: 100
    publish_map_tf: true
    publish_odom_tf: true
    slam_topic: "/Odometry"
    localization_topic: "/hdl_global_localization/result"
    wheel_radius: 0.01
    power:
      effort_coeff: 1.90
      vel_coeff: 0.0088
      power_offset: -9.8
    twist_angular: 0.5233
    max_odom_vel: 10.0
    timeout: 0.1
    pid_follow: { p: 10.0, i: 0, d: 0.01, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: true }
    twist_covariance_diagonal: [ 0.001, 0.001, 0.001, 0.001, 0.001, 0.001 ]

    # ActiveSuspensionController
    wheels:
      left_front:
        pose: [ 0.2018, 0.172, 0. ]
        roller_angle: -0.785
        joint: left_front_wheel_joint
        <<: &wheel_setting
          radius: 0.07625
          pid: { p: 0.25, i: 0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: true }
      right_front:
        pose: [ 0.2018, -0.172, 0. ]
        roller_angle: 0.785
        joint: right_front_wheel_joint
        <<: *wheel_setting
      left_back:
        pose: [ -0.2018, 0.172, 0. ]
        roller_angle: 0.785
        joint: left_back_wheel_joint
        <<: *wheel_setting
      right_back:
        pose: [ -0.2018, -0.172, 0. ]
        roller_angle: -0.785
        joint: right_back_wheel_joint
        <<: *wheel_setting
    suspension_leg:
      left:
        joint: left_hip_joint
        <<: &leg_setting
          pid: { p: 10.0, i: 2.0, d: 0.0, i_clamp_max: 1.0, i_clamp_min: -1.0, antiwindup: true, publish_state: true }
          #pid: { p: 300.0, i: 15.0, d: 0.0, i_clamp_max: 15.0, i_clamp_min: -15.0, antiwindup: true, publish_state: true }
      right:
        joint: right_hip_joint
        <<: *leg_setting
    feed_forward_offset: 0.5
    stretch_coff_A_: 15.0
    stretch_coff_k_: -18.75
    shrink_coff_A_: -18.0
    shrink_coff_k_: 0.0
    feedforward_effect_time_: 10.0

  orientation_controller:
    type: rm_orientation_controller/Controller
    publish_rate: 100
    name: "gimbal_imu"
    frame_source: "odom"
    frame_target: "base_link"

  gimbal_controller:
    type: rm_gimbal_controllers/Controller
    controllers:
      yaw:
        joint: "yaw_joint"
        pid: { p: 2.4, i: 28.0, d: 0.0, i_clamp_max: 0.25, i_clamp_min: -0.25, antiwindup: true, publish_state: true }
        pid_pos: { p: 10.0, i: 0.0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: true }
        k_chassis_vel: 0.0
        k_v: 1.0
        accel: 40.0
      pitch:
        joint: "pitch_joint"
        pid: { p: 1.5, i: 19.0, d: 0.0, i_clamp_max: 0.50, i_clamp_min: -0.30, antiwindup: true, publish_state: true }
        pid_pos: { p: 14.5, i: 0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: true }
        k_v: 1.0
        accel: 40.0
    imu_name: "gimbal_imu"
    feedforward:
      gravity: -1.944
      enable_gravity_compensation: false
      mass_origin: [ 0.06662, -0.012383, 0.038901 ]
    bullet_solver:
      resistance_coff_qd_10: 0.01
      resistance_coff_qd_15: 0.01
      resistance_coff_qd_16: 0.01
      resistance_coff_qd_18: 0.01
      resistance_coff_qd_30: 0.01
      g: 9.81
      delay: 0.32
      wait_next_armor_delay: 0.08
      wait_diagonal_armor_delay: 0.12
      dt: 0.001
      timeout: 0.001
      publish_rate: 50
      max_switch_angle: 50
      min_switch_angle: 2
      ban_shoot_duration: 0.0
      gimbal_switch_duration: 0.0
      max_track_target_vel: 1.2
      center_delay: 0.088
      track_move_target_delay: 0.034
    ballistic_solver:
      mass: 0.0445
      radius: 0.02125
      gun_offset_x: 0.20
      gun_offset_z: 0.15
      Cd_value: 0.63
      Cd_distance: 19.7
      Cd_slope: 0.01
      air_density: 1.2
      g: 9.81
      initial_vel: 16.4
      rk4_simulate_step: 0.01
      newton_convergence_tol: 2e-5
      newton_pitch_epsilon: 1e-4
      max_newton_iterations: 7
      max_newton_step: 0.1
      output_pitch_match:
        - [18.00, -0.562]
        - [19.70, -0.600]
        - [21.00, -0.640]
    chassis_vel:
      num_data: 20
      debug: true

  shooter_controller:
    type: rm_shooter_controllers/Controller
    publish_rate: 50
    friction:
      friction_left:
        left_front_friction_wheel:
          joint: "left_front_friction_wheel_joint"
          pid: { p: 0.001, i: 0.01, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: true }
        left_back_friction_wheel:
          joint: "left_back_friction_wheel_joint"
          pid: { p: 0.001, i: 0.01, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: true }
          wheel_speed_offset: -75
      friction_mid:
        mid_front_friction_wheel:
          joint: "mid_front_friction_wheel_joint"
          pid: { p: 0.001, i: 0.01, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: true }
          wheel_speed_direction: -1.0
        mid_back_friction_wheel:
          joint: "mid_back_friction_wheel_joint"
          pid: { p: 0.001, i: 0.01, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: true }
          wheel_speed_offset: -75
          wheel_speed_direction: -1.0
      friction_right:
        right_front_friction_wheel:
          joint: "right_front_friction_wheel_joint"
          pid: { p: 0.001, i: 0.01, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: true }
          wheel_speed_direction: -1.0
        right_back_friction_wheel:
          joint: "right_back_friction_wheel_joint"
          pid: { p: 0.001, i: 0.01, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: true }
          wheel_speed_offset: -75
          wheel_speed_direction: -1.0
    trigger:
      joint: "trigger_joint"
      pid: { p: 24.0, i: 0.0, d: 0.85, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true, publish_state: true }
    push_per_rotation: 6
    push_qd_threshold: 0.85
    block_effort: 6.8
    block_speed: 0.1
    block_duration: 0.05
    block_overtime: 0.5
    anti_block_angle: 0.43
    anti_block_threshold: 0.1
    forward_push_threshold: 0.2
    exit_push_threshold: 0.23
    offset: 220.0
