    # 11-14
    q: [ 50., 1., 1000., 100, 5000., 1. ]

    #    q: [ 100., 1., 500., 100, 5000., 1. ]
    # T Tp
    #    r: [ 0.6, 0.2 ]
    # 能平衡 但抖动
    #    r: [ 1.75, 0.8 ]
