controllers:
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 100
  robot_state_controller:
    type: robot_state_controller/RobotStateController
    publish_rate: 100

  orientation_controller:
    type: rm_orientation_controller/Controller
    publish_rate: 100
    name: "gimbal_imu"
    frame_source: "odom"
    frame_target: "base_link"

  gimbal_controller:
    type: rm_gimbal_controllers/Controller
    controllers:
      yaw:
        joint: "yaw_joint"
        pid: { p: 0.2, i: 17.0, d: 0.0, i_clamp_max: 0.1, i_clamp_min: -0.1, antiwindup: true, publish_state: false }
        pid_pos: { p: 20.0, i: 0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: false }
        chassis_comp_a: 0.00651
        chassis_comp_b: 0.5085
        chassis_comp_c: 1.5708
        chassis_comp_d: 0.0736
        k_v: 1.0
        accel: 45.0
      pitch:
        joint: "pitch_joint"
        pid: { p: 0.6, i: 15.0, d: 0.0, i_clamp_max: 0.1, i_clamp_min: -0.1, antiwindup: true, publish_state: false }
        pid_pos: { p: 18.0, i: 0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: false }
        k_v: 1.0
        accel: 40.0
    delay: 0.03
    chassis_vel:
      num_data: 30
      debug: true
    imu_name: "gimbal_imu"
    feedforward:
      gravity: 8.725
      enable_gravity_compensation: false
      mass_origin: [ 0.0363,0.0,0.01 ]
    bullet_solver:
      resistance_coff_qd_10: 0.001
      resistance_coff_qd_15: 0.001
      resistance_coff_qd_16: 0.001
      resistance_coff_qd_18: 0.001
      resistance_coff_qd_30: 0.001
      g: 9.81
      delay: 0.035
      wait_next_armor_delay: 0.0
      wait_diagonal_armor_delay: 0.0
      dt: 0.001
      timeout: 0.5
      publish_rate: 50
      max_switch_angle: 50
      min_switch_angle: 2
      ban_shoot_duration: 0.035
      gimbal_switch_duration: 0.09
      max_track_target_vel: 10.0
      switch_hysteresis: 1.0
      max_chassis_angular_vel: 12.0
      track_rotate_target_delay: 0.03
      track_move_target_delay: 0.04

  trigger_calibration_controller:
    type: rm_calibration_controllers/MechanicalCalibrationController
    actuator: [ trigger_joint_motor ]
    velocity:
      joint: trigger_joint
      search_velocity: 3.1415
      vel_threshold: 0.2
      pid: { p: 0.3, i: 0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true }

  shooter_controller:
    type: rm_shooter_controllers/Controller
    publish_rate: 50
    friction:
      friction_left:
        left_friction_wheel:
          joint: "left_friction_wheel_joint"
          pid: { p: 0.0007, i: 0.005, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: false }
          wheel_speed_direction: 1.0
      friction_right:
        right_friction_wheel:
          joint: "right_friction_wheel_joint"
          pid: { p: 0.0007, i: 0.005, d: 0.0, i_clamp_max: 0.01, i_clamp_min: -0.01, antiwindup: true, publish_state: false }
          wheel_speed_direction: -1.0
    trigger:
      joint: "trigger_joint"
      pid: { p: 34.0, i: 0.0, d: 1.0, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true, publish_state: false }
    push_per_rotation: 9
    push_qd_threshold: 0.90
    block_effort: 2.2
    block_speed: 0.1
    block_duration: 0.05
    block_overtime: 0.5
    anti_block_angle: 0.46
    anti_block_threshold: 0.1
    forward_push_threshold: 0.22
    exit_push_threshold: 0.25
    wheel_speed_drop_threshold: 5.7
    wheel_speed_raise_threshold: 1.2
    freq_threshold: 15.0

  chassis_controller:
    type: rm_chassis_controllers/BipedalController
    # ChassisBase
    publish_rate: 100
    enable_odom_tf: true
    publish_odom_tf: true
    power:
      effort_coeff: 1.339
      vel_coeff: 0.016
      power_offset: 0
    twist_angular: 0.5233
    max_odom_vel: 10.0
    timeout: 0.1
    pid_follow: { p: 6.0, i: 0, d: 0.6, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: true }
    pid_block_error: { p: 0, i: 0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: true }
    twist_covariance_diagonal: [ 0.001, 0.001, 0.001, 0.001, 0.001, 0.001 ]

    # BipedalController
    pid_left_leg: { p: 600.0, i: 50., d: 60, i_clamp_max: 40.0, i_clamp_min: -40.0, antiwindup: true, publish_state: true }
    pid_right_leg: { p: 600.0, i: 50., d: 60, i_clamp_max: 40.0, i_clamp_min: -40.0, antiwindup: true, publish_state: true }
    pid_theta_diff: { p: 200.0, i: 0.0, d: 2.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: true }
    pid_roll: { p: 800.0, i: 0, d: 30., i_clamp_max: 30.0, i_clamp_min: -30.0, antiwindup: true, publish_state: true }
    #    pid_yaw_pos: { p: 2.0, i: 1.0, d: 0.0, i_clamp_max: 3.0, i_clamp_min: 3.0, antiwindup: true, publish_state: true }
    pid_yaw_pos: { p: 0.0, i: 0.0, d: 0.0, i_clamp_max: 3.0, i_clamp_min: 3.0, antiwindup: true, publish_state: true }
    pid_yaw_vel: { p: 0.8, i: 2.7, d: 0., i_clamp_max: 0.6, i_clamp_min: -0.6, antiwindup: true, publish_state: true }
    pid_left_leg_theta: { p: 100.0, i: 0., d: 10., i_clamp_max: 2.0, i_clamp_min: -2.0, antiwindup: true, publish_state: true }
    pid_right_leg_theta: { p: 100.0, i: 0., d: 10., i_clamp_max: 2.0, i_clamp_min: -2.0, antiwindup: true, publish_state: true }
    pid_left_leg_theta_vel: { p: 5.0, i: 1.0, d: 0., i_clamp_max: 5.0, i_clamp_min: -5.0, antiwindup: true, publish_state: true }
    pid_right_leg_theta_vel: { p: 5.0, i: 1.0, d: 0., i_clamp_max: 5.0, i_clamp_min: -5.0, antiwindup: true, publish_state: true }
    pid_left_wheel_vel: { p: 0.1, i: 0.01, d: 0.0, i_clamp_max: 1.0, i_clamp_min: -1.0, antiwindup: true, publish_state: true }
    pid_right_wheel_vel: { p: 0.1, i: 0.01, d: 0.0, i_clamp_max: 1.0, i_clamp_min: -1.0, antiwindup: true, publish_state: true }

    pid_left_leg_stand_up: { p: 700.0, i: 50.0, d: 40.0, i_clamp_max: 20.0, i_clamp_min: -20.0, antiwindup: true, publish_state: true }
    pid_right_leg_stand_up: { p: 700.0, i: 50.0, d: 40.0, i_clamp_max: 20.0, i_clamp_min: -20.0, antiwindup: true, publish_state: true }

    gravity_force: 30
    spring_force: 0
    default_leg_length: 0.2
    L_weight: 0.536
    Lm_weight: 0.463
    # 机体质心距离转轴位置
    l: 0.03
    #    l: 0.001
    # 轮子质量
    m_w: 0.563518
    # 摆杆质量
    m_p: 0.554
    #    m_p: 0.2467
    # 机体质量
    M: 15
    # 轮子转动惯量
    #    i_w: 0.003357
    i_w: 0.002028
    # 摆杆转动惯量
    i_p: 0.0029816
    #    i_p: 0.04177
    # 机体转动惯量
    i_m: 0.2467
    g: 9.81
    # 轮子半径
    wheel_radius: 0.06

    # theta d_theta x dx phi d_phi
    # 能平衡 但抖动
    #    q: [ 50., 1., 100., 20., 350., 1. ]

    #    q: [ 100.0, 1, 500, 100, 5000.0, 1 ]
    # 来回5cm 加速摆杆幅度不大 pitch不太稳定
    #    q: [ 100., 1., 500., 100., 5000., 1. ]

    # 11-14
    #    q: [ 50., 1., 1000., 100, 5000., 1. ]

    # 11-22
    #    q: [ 100.0, 1.2, 2000.0, 2.22, 8125.0, 1 ]

    # T Tp
    #    r: [ 0.6, 0.2 ]
    # 能平衡 但抖动
    #    r: [ 1.75, 0.8 ]

    # 12-19
    q: [ 150.0, 1, 540.0, 75, 5025.0, 1 ]

    # 来回5cm 加速摆杆幅度不大 pitch不太稳定
    #    r: [ 180 , 40 ]

    # 11-14
    #    r: [ 190 , 20 ]

    # 11-22
    #    r: [ 19.5, 1.3 ]

    # 12-3
    #    r: [ 70 , 2 ]

    # 12-19
    r: [ 30, 2 ]

    x_bias: 0.075
    pitch_bias: 0.
    roll_bias: 0.

    jumpOverTime: 2.0
    p1: -241100
    p2: 170300
    p3: 39310
    p4: 3234
