ethercat_master:
  time_step: 0.001

ethercat_devices:
  - type: Mit
    name: Chassis_leg
    configuration_file: device_configurations/hero_chassis_leg.yaml
    ethercat_bus: enp114s0
    ethercat_address: 1
  - type: Rm
    name: Chassis
    configuration_file: device_configurations/hero_chassis.yaml
    ethercat_bus: enp114s0
    ethercat_address: 2
  - type: Rm
    name: Gimbal
    configuration_file: device_configurations/hero_gimbal.yaml
    ethercat_bus: enp114s0
    ethercat_address: 3
